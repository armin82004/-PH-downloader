name: Download React Site

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Website URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install SingleFile
        run: npm install -g single-file-cli
      
      - name: Download with SingleFile
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed 's|https\?://||' | sed 's|/.*$||' | sed 's|\.|_|g')
          
          single-file "${{ github.event.inputs.site_url }}" "./${DOMAIN}_${TIMESTAMP}.html"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html 2>/dev/null || true
          git commit -m "Add React page backup" 2>/dev/null || true
          git push
