name: دانلود کامل سایت (بدون خطا)

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس سایت'
        required: true
        type: string
        default: 'https://www.typescriptlang.org'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      # ============================================
      # دانلود با ignore کردن exit code 8
      # ============================================
      - name: Download website (ignoring harmless errors)
        id: download
        continue-on-error: true  # اجازه ادامه حتی با خطا
        run: |
          SITE="${{ github.event.inputs.site_url }}"
          
          echo "شروع دانلود: $SITE"
          
          # نکته مهم: || true باعث می‌شود exit code 8 نادیده گرفته شود
          wget \
            --recursive \
            --level=inf \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=2 \
            --random-wait \
            --limit-rate=500k \
            --no-clobber \
            --continue \
            --user-agent="Mozilla/5.0" \
            --execute robots=off \
            --directory-prefix="./mirror" \
            "$SITE" || true
          
          echo "✅ دانلود کامل شد (خطاهای جزئی نادیده گرفته شدند)"
          
          # بررسی وجود فایل index.html برای اطمینان از موفقیت
          if [ -f "./mirror/www.typescriptlang.org/index.html" ] || [ -f "./mirror/index.html" ]; then
            echo "✅ فایل index.html پیدا شد - دانلود موفق بوده"
            echo "download_success=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ فایل index.html پیدا نشد"
            echo "download_success=false" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # آمار دانلود
      # ============================================
      - name: Download statistics
        if: always()
        run: |
          echo "========================================="
          echo "          آمار دانلود"
          echo "========================================="
          
          if [ -d "./mirror" ]; then
            FILE_COUNT=$(find ./mirror -type f 2>/dev/null | wc -l)
            TOTAL_SIZE=$(du -sh ./mirror 2>/dev/null | cut -f1)
            
            echo "📄 تعداد فایل‌ها: $FILE_COUNT"
            echo "💾 حجم کل: $TOTAL_SIZE"
            
            # نمایش پوشه‌های اصلی
            echo ""
            echo "پوشه‌های دانلود شده:"
            ls -la ./mirror/
          else
            echo "❌ پوشه mirror وجود ندارد!"
          fi

      # ============================================
      # نصب RAR
      # ============================================
      - name: Install rar
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y rar unrar

      # ============================================
      # ساخت فایل RAR
      # ============================================
      - name: Create RAR archive
        if: always()
        run: |
          if [ -d "./mirror" ]; then
            echo "📦 در حال ساخت فایل RAR..."
            
            cd mirror
            rar a -v95m -m5 -rr10% -ep1 "../backup.rar" ./
            cd ..
            
            echo "✅ فایل RAR ساخته شد:"
            ls -lh backup*.rar
          else
            echo "❌ پوشه mirror وجود ندارد - RAR ساخته نشد"
          fi

      # ============================================
      # آپلود به Artifacts
      # ============================================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-backup
          path: |
            backup*.rar
            backup*.part*.rar
          compression-level: 0
          retention-days: 30

      # ============================================
      # گزارش نهایی
      # ============================================
      - name: Final report
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "            گزارش نهایی"
          echo "========================================="
          echo "✅ عملیات با موفقیت انجام شد"
          echo "📁 فایل‌ها در بخش Artifacts موجود است"
