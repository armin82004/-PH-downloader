name: دانلود کامل سایت و تبدیل به RAR

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
        default: 'https://example.com'
      part_size:
        description: 'حجم هر پارت RAR (95m, 50m, 100m)'
        required: false
        type: string
        default: '95m'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download website with wget
        run: |
          SITE="${{ github.event.inputs.site_url }}"
          echo "📥 Downloading: $SITE"
          
          # حذف https:// از ابتدای آدرس برای نام پوشه
          DOMAIN=$(echo "$SITE" | sed 's|https\?://||' | sed 's|/.*$||')
          
          # دانلود کامل سایت با wget (این برای سایت‌های معمولی و React جزئی کار می‌کند)
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=2 \
            --random-wait \
            --limit-rate=500k \
            --no-clobber \
            --continue \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --directory-prefix=./downloads \
            --execute robots=off \
            "$SITE"
          
          echo "✅ Download completed!"

      - name: Install rar tool
        run: |
          sudo apt-get update
          sudo apt-get install -y rar unrar

      - name: Create RAR archive in 95MB parts
        run: |
          cd downloads
          
          # پیدا کردن پوشه دانلود شده
          DOWNLOAD_FOLDER=$(find . -maxdepth 1 -type d -name "*.com" -o -name "*.org" -o -name "*.net" -o -name "*.ir" 2>/dev/null | head -1)
          
          if [ -z "$DOWNLOAD_FOLDER" ]; then
            DOWNLOAD_FOLDER="."
          fi
          
          echo "📦 Creating RAR from: $DOWNLOAD_FOLDER"
          
          # نام فایل خروجی
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed 's|https\?://||' | sed 's|/.*$||' | sed 's|\.|_|g')
          
          # ساخت RAR با پارت‌های 95 مگابایتی
          rar a -v${{ github.event.inputs.part_size }} -m5 -rr10% -ep1 "../${DOMAIN}.rar" "$DOWNLOAD_FOLDER"/
          
          cd ..
          echo "✅ RAR files created:"
          ls -lh *.rar *.part*.rar 2>/dev/null || echo "No RAR files found"

      - name: Upload RAR files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-backup
          path: |
            *.rar
            *.part*.rar
          compression-level: 0
          retention-days: 30
