name: دانلود کامل سایت (آفلاین کامل)

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس کامل سایت (مثال: https://example.com)'
        required: true
        type: string
        default: 'https://www.typescriptlang.org'

jobs:
  full-mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================
      # نصب ابزارهای مورد نیاز
      # ============================================
      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget rar unrar
          # wget2 گاهی مشکل دارد، از wget استاندارد استفاده می‌کنیم

      # ============================================
      # دانلود کامل سایت با wget (بدون خطای مهلک)
      # ============================================
      - name: Complete website mirror
        id: download
        run: |
          SITE="${{ github.event.inputs.site_url }}"
          echo "========================================="
          echo "شروع آینه‌سازی کامل سایت: $SITE"
          echo "========================================="
          
          # حذف / انتهایی اگر وجود داشت
          SITE_CLEAN="${SITE%/}"
          
          # دانلود با تنظیمات کامل
          # استفاده از یک خط و کاراکتر \ در انتهای هر خط برای ادامه فرمان
          wget \
            --recursive \
            --level=inf \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=2 \
            --random-wait \
            --limit-rate=500k \
            --no-clobber \
            --continue \
            --tries=5 \
            --timeout=30 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --execute robots=off \
            --directory-prefix="./mirror" \
            "$SITE_CLEAN"
          
          echo "✅ دانلود با موفقیت کامل شد"
          
          # ذخیره نام دامنه برای مراحل بعد
          DOMAIN=$(echo "$SITE_CLEAN" | sed 's|https\?://||' | cut -d'/' -f1)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      # ============================================
      # بررسی آمار دانلود
      # ============================================
      - name: Download statistics
        id: stats
        run: |
          echo "========================================="
          echo "          آمار دانلود انجام شده"
          echo "========================================="
          
          # پیدا کردن پوشه اصلی
          MIRROR_DIR=$(find ./mirror -maxdepth 1 -type d \( -name "www.*" -o -name "*.com" -o -name "*.org" -o -name "*.net" -o -name "*.ir" \) 2>/dev/null | head -1)
          
          if [ -z "$MIRROR_DIR" ]; then
            MIRROR_DIR="./mirror"
          fi
          
          if [ ! -d "$MIRROR_DIR" ]; then
            echo "❌ پوشه دانلود یافت نشد!"
            echo "dir_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          FILE_COUNT=$(find "$MIRROR_DIR" -type f 2>/dev/null | wc -l)
          TOTAL_SIZE=$(du -sh "$MIRROR_DIR" 2>/dev/null | cut -f1)
          
          echo "📁 پوشه: $MIRROR_DIR"
          echo "📄 تعداد فایل‌ها: $FILE_COUNT"
          echo "💾 حجم کل: $TOTAL_SIZE"
          
          echo "dir_exists=true" >> $GITHUB_OUTPUT
          echo "mirror_dir=$MIRROR_DIR" >> $GITHUB_OUTPUT
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT

      # ============================================
      # نصب RAR
      # ============================================
      - name: Install rar
        if: steps.stats.outputs.dir_exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y rar unrar

      # ============================================
      # ساخت فایل‌های RAR با پارت 95 مگابایت
      # ============================================
      - name: Create RAR archives
        if: steps.stats.outputs.dir_exists == 'true'
        run: |
          echo "========================================="
          echo "     ساخت فایل‌های RAR (پارت 95 مگابایت)"
          echo "========================================="
          
          MIRROR_DIR="${{ steps.stats.outputs.mirror_dir }}"
          DOMAIN="${{ steps.download.outputs.domain }}"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          OUTPUT_NAME="${DOMAIN}_${TIMESTAMP}"
          
          echo "📦 پوشه منبع: $MIRROR_DIR"
          echo "📦 نام خروجی: $OUTPUT_NAME"
          
          cd mirror
          
          # نام پوشه اصلی را پیدا کنید
          FOLDER_NAME=$(basename "$MIRROR_DIR")
          
          # ساخت RAR
          rar a -v95m -m5 -rr10% -ep1 "../${OUTPUT_NAME}.rar" "$FOLDER_NAME/"
          
          cd ..
          
          echo ""
          echo "✅ فایل‌های RAR ساخته شدند:"
          ls -lh ${OUTPUT_NAME}*.rar 2>/dev/null || echo "فایل RAR ساخته شد"

      # ============================================
      # آپلود به GitHub Artifacts
      # ============================================
      - name: Upload to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: website-mirror-${{ github.run_number }}
          path: |
            *.rar
            *.part*.rar
          compression-level: 0
          retention-days: 30

      # ============================================
      # گزارش نهایی
      # ============================================
      - name: Final report
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "            گزارش نهایی"
          echo "========================================="
          echo ""
          echo "📊 خلاصه:"
          echo "   - وضعیت دانلود: ${{ steps.stats.outputs.dir_exists == 'true' && 'موفق' || 'ناموفق' }}"
          echo "   - تعداد فایل‌ها: ${{ steps.stats.outputs.file_count }}"
          echo "   - حجم کل سایت: ${{ steps.stats.outputs.total_size }}"
          echo ""
          echo "📦 فایل‌های آفلاین:"
          echo "   - در بخش Artifacts این اجرا قابل دانلود است"
          echo "   - فایل‌های RAR را دانلود و Extract کنید"
          echo "   - فایل index.html را در مرورگر باز کنید"
